openapi: 3.0.0
info:
  title: API Bibliothèque UHA
  description: API de gestion avec authentification par Magic Link (Email uniquement).
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Serveur de développement local

paths:
  /auth/register:
    post:
      summary: Inscription d'un nouvel utilisateur
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, nom, prenom]
              properties:
                email: { type: string, example: "etudiant@uha.fr" }
                nom: { type: string, example: "Dupont" }
                prenom: { type: string, example: "Jean" }
                role: { type: string, enum: [ETUDIANT, ENSEIGNANT, BIBLIOTHECAIRE] }
      responses:
        '201':
          description: Utilisateur créé (statut ACTIF par défaut)
        '400':
          description: Erreur lors de l'inscription

  /auth/login:
    post:
      summary: Connexion par Email (Magic Link)
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, example: "etudiant@uha.fr" }
      responses:
        '200':
          description: Email de connexion envoyé
        '401':
          description: Erreur d'envoi

  /livres:
    get:
      summary: Liste tous les livres du catalogue
      tags: [Catalogue]
      responses:
        '200':
          description: Liste des livres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Livre'

  /emprunts:
    get:
      summary: Liste les emprunts
      tags: [Emprunts]
      parameters:
        - name: utilisateurId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Emprunt'

  /admin/rules:
    get:
      summary: Récupère les règles système
      tags: [Administrateur]
      responses:
        '200':
          description: Liste des règles
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemRule'
  /admin/rules/{ruleId}:
    put:
      summary: Met à jour l’état d’une règle
      tags: [Administrateur]
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active:
                  type: boolean
      responses:
        '200':
          description: Règle mise à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/SystemRule'
        '400':
          description: Mauvaise requête
        '404':
          description: Règle non trouvée

  /admin/users:
    get:
      summary: Récupère les comptes administrables
      tags: [Administrateur]
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUser'

  /admin/metrics:
    get:
      summary: Statistiques globales du back-office
      tags: [Administrateur]
      responses:
        '200':
          description: Nombre d’objets clés
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/AdminMetrics'

  /users:
    get:
      summary: Liste des utilisateurs
      tags: [Utilisateurs]
      responses:
        '200':
          description: Comptes utilisateurs
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Utilisateur'

  /reservations:
    get:
      summary: Liste des réservations
      tags: [Réservations]
      responses:
        '200':
          description: Réservations réalisées
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reservation'

  /emprunts:
    get:
      summary: Liste des emprunts
      tags: [Emprunts]
      responses:
        '200':
          description: Emprunts enregistrés
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Emprunt'

components:
  schemas:
    Utilisateur:
      type: object
      properties:
        id: { type: string, format: uuid }
        nom: { type: string }
        prenom: { type: string }
        email: { type: string }
        role: { type: string }
        statut: { type: string, example: "ACTIF" }

    Livre:
      type: object
      required: [isbn, titre, auteur, categorie, annee]
      properties:
        isbn: { type: string }
        titre: { type: string }
        auteur: { type: string }
        categorie: { type: string }
        annee: { type: integer }
        resume: { type: string }

    Emprunt:
      type: object
      properties:
        id: { type: integer }
        dateEmprunt: { type: string, format: date }
        dateRetourPrevue: { type: string, format: date }
        estRendu: { type: boolean }
        utilisateurId: { type: string, format: uuid }
        exemplaireId: { type: integer }
        dateRetourReelle: { type: string, format: date, nullable: true }
        utilisateur:
          $ref: '#/components/schemas/Utilisateur'
        exemplaire:
          $ref: '#/components/schemas/Exemplaire'

    SystemRule:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        active:
          type: boolean

    AdminUser:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        privileges:
          type: array
          items:
            type: string

    Reservation:
      type: object
      properties:
        id:
          type: string
        id_utilisateur:
          type: string
        isbn:
          type: string
        date_reservation:
          type: string
        statut:
          type: string
        position_file:
          type: integer
        utilisateur:
          $ref: '#/components/schemas/Utilisateur'
        livre:
          $ref: '#/components/schemas/Livre'

    Exemplaire:
      type: object
      properties:
        id_exemplaire:
          type: string
        isbn:
          type: string
        etat:
          type: string
        localisation:
          type: string
        disponibilite:
          type: boolean

    AdminMetrics:
      type: object
      properties:
        totalBooks:
          type: integer
        activeEmprunts:
          type: integer
        totalUsers:
          type: integer
        administrators:
          type: integer
        librarians:
          type: integer
