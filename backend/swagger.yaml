openapi: 3.0.0
info:
  title: API Bibliothèque UHA
  description: API de gestion avec authentification par Magic Link (Email uniquement).
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Serveur de développement local

paths:
  /auth/register:
    post:
      summary: Inscription d'un nouvel utilisateur
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, nom, prenom]
              properties:
                email: { type: string, example: "etudiant@uha.fr" }
                nom: { type: string, example: "Dupont" }
                prenom: { type: string, example: "Jean" }
                role: { type: string, enum: [ETUDIANT, ENSEIGNANT, BIBLIOTHECAIRE] }
      responses:
        '201':
          description: Utilisateur créé (statut ACTIF par défaut)
        '400':
          description: Erreur lors de l'inscription

  /auth/login:
    post:
      summary: Connexion par Email (Magic Link)
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, example: "etudiant@uha.fr" }
      responses:
        '200':
          description: Email de connexion envoyé
        '401':
          description: Erreur d'envoi

  /livres:
    get:
      summary: Liste tous les livres du catalogue
      tags: [Catalogue]
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Recherche par titre, auteur ou ISBN
        - in: query
          name: categorie
          schema:
            type: string
          description: Filtrer par catégorie (ex: Roman, Dystopie)
        - in: query
          name: sort
          schema:
            type: string
            enum: [auteur, disponibilite, titre]
          description: Trier les résultats
      responses:
        '200':
          description: Liste des livres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Livre'

  /emprunts:
    get:
      summary: Liste les emprunts
      tags: [Emprunts]
      parameters:
        - in: query
          name: utilisateurId
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Emprunt'

components:
  schemas:
    Utilisateur:
      type: object
      properties:
        id: { type: string, format: uuid }
        nom: { type: string }
        prenom: { type: string }
        email: { type: string }
        role: { type: string }
        statut: { type: string, example: "ACTIF" }

    Livre:
      type: object
      required: [isbn, titre, auteur, categorie, annee]
      properties:
        isbn: { type: string }
        titre: { type: string }
        auteur: { type: string }
        categorie: { type: string }
        annee: { type: integer }
        est_disponible: { type: boolean }

    Emprunt:
      type: object
      properties:
        id: { type: integer }
        dateEmprunt: { type: string, format: date }
        dateRetourPrevue: { type: string, format: date }
        estRendu: { type: boolean }
        utilisateurId: { type: string, format: uuid }
        exemplaireId: { type: integer }