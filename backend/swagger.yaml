openapi: 3.0.0
info:
  title: API Bibliothèque UHA
  description: API de gestion harmonisée avec la base de données PostgreSQL (Snake Case) et authentification JWT.
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Serveur de développement local

security:
  - bearerAuth: []

paths:
  # --- AUTHENTIFICATION ---
  /auth/register:
    post:
      summary: Inscription d'un nouvel utilisateur
      tags: [Authentification]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, nom, prenom, password]
              properties:
                email: { type: string, example: "etudiant@uha.fr" }
                nom: { type: string, example: "Dupont" }
                prenom: { type: string, example: "Jean" }
                password: { type: string, format: password, example: "MonSecret123!" }
                role: { type: string, enum: [ETUDIANT, ENSEIGNANT, BIBLIOTHECAIRE] }
      responses:
        '201':
          description: Utilisateur créé avec succès.

  /auth/login:
    post:
      summary: Connexion par Email et Mot de Passe
      tags: [Authentification]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: "etudiant@uha.fr" }
                password: { type: string, format: password, example: "MonSecret123!" }
      responses:
        '200':
          description: Connexion réussie. Renvoie le token JWT.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Connexion réussie !" }
                  token: { type: string }
                  user:
                    $ref: '#/components/schemas/Utilisateur'

  # --- CATALOGUE DES LIVRES ---
  /api/books:
    get:
      summary: Liste tous les livres du catalogue avec filtres
      tags: [Catalogue]
      security: []
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: categorie
          schema: { type: string }
      responses:
        '200':
          description: Liste des livres récupérée. # AJOUTÉ ICI
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Livre'
    post:
      summary: Ajouter un nouveau livre
      tags: [Catalogue]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Livre'
      responses:
        '201':
          description: Livre ajouté avec succès.

  /api/books/{isbn}:
    get:
      summary: Détails d'un livre par ISBN
      tags: [Catalogue]
      security: []
      parameters:
        - in: path
          name: isbn
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Détails du livre trouvés. # AJOUTÉ ICI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Livre'

  # --- GESTION DES EMPRUNTS ---
  /api/loans:
    get:
      summary: Liste les emprunts de l'utilisateur connecté
      tags: [Emprunts]
      responses:
        '200':
          description: Liste des emprunts récupérée. # AJOUTÉ ICI
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Emprunt'
    post:
      summary: Enregistrer un nouvel emprunt
      tags: [Emprunts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_utilisateur, isbn]
              properties:
                id_utilisateur: { type: string, format: uuid }
                isbn: { type: string }
      responses:
        '201':
          description: Emprunt créé.
        '202':
          description: Placé en file d'attente (réservation).

  /api/loans/{id}/return:
    put:
      summary: Enregistrer le retour d'un livre
      tags: [Emprunts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Retour enregistré avec succès. # AJOUTÉ ICI

  # --- UTILISATEURS ---
  /api/users/me:
    get:
      summary: Profil de l'utilisateur connecté
      tags: [Utilisateurs]
      responses:
        '200':
          description: Profil utilisateur récupéré. # AJOUTÉ ICI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Utilisateur'

  /api/users:
    get:
      summary: Liste tous les utilisateurs (Admin)
      tags: [Utilisateurs]
      responses:
        '200':
          description: Liste des utilisateurs récupérée. # AJOUTÉ ICI
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Utilisateur'

  # --- ADMINISTRATION ---
  /admin/metrics:
    get:
      summary: Statistiques globales du système
      tags: [Administrateur]
      responses:
        '200':
          description: Statistiques récupérées. # AJOUTÉ ICI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMetrics'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Utilisateur:
      type: object
      properties:
        id: { type: string, format: uuid }
        nom: { type: string }
        prenom: { type: string }
        email: { type: string }
        role: { type: string, enum: [ETUDIANT, ENSEIGNANT, BIBLIOTHECAIRE, ADMINISTRATEUR] }
        statut: { type: string, example: "ACTIF" }
        created_at: { type: string, format: date-time }

    Livre:
      type: object
      required: [isbn, titre, auteur]
      properties:
        isbn: { type: string }
        titre: { type: string }
        auteur: { type: string }
        categorie: { type: string }
        resume: { type: string }
        annee: { type: integer }

    Emprunt:
      type: object
      properties:
        id: { type: string, format: uuid }
        id_utilisateur: { type: string, format: uuid }
        id_exemplaire: { type: string, format: uuid }
        date_emprunt: { type: string, format: date }
        date_retour_prevue: { type: string, format: date }
        date_retour_reelle: { type: string, format: date, nullable: true }

    AdminMetrics:
      type: object
      properties:
        totalBooks: { type: integer }
        activeEmprunts: { type: integer }
        totalUsers: { type: integer }