openapi: 3.0.0
info:
  title: API Bibliothèque UHA
  description: API de gestion avec assistant IA local (Ollama) et authentification Magic Link.
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Serveur de développement local

paths:
  /auth/register:
    post:
      summary: Inscription d'un nouvel utilisateur
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, nom, prenom]
              properties:
                email: { type: string, example: "etudiant@uha.fr" }
                nom: { type: string, example: "Dupont" }
                prenom: { type: string, example: "Jean" }
                role: { type: string, enum: [ETUDIANT, ENSEIGNANT, BIBLIOTHECAIRE] }
      responses:
        '201':
          description: Utilisateur créé
        '400':
          description: Erreur lors de l'inscription

  /auth/login:
    post:
      summary: Connexion par Email (Magic Link)
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, example: "etudiant@uha.fr" }
      responses:
        '200':
          description: Email de connexion envoyé
        '401':
          description: Erreur d'envoi

  /ai/query:
    post:
      summary: Poser une question à l'assistant IA
      tags: [AI Assistant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  example: "Quels sont les livres de Science-Fiction disponibles ?"
                userId:
                  type: string
                  example: "student1"
      responses:
        '200':
          description: Réponse de l'IA générée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
        '500':
          description: Erreur serveur (Ollama hors ligne ou erreur DB)

  /livres:
    get:
      summary: Liste tous les livres du catalogue
      tags: [Catalogue]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: categorie
          schema: { type: string }
        - in: query
          name: sort
          schema:
            type: string
            enum: [auteur, disponibilite, titre]
      responses:
        '200':
          description: Liste des livres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Livre'

  /livres/{isbn}/dispo:
    get:
      summary: Récupère le stock réel pour un ISBN précis
      tags: [Catalogue]
      parameters:
        - in: path
          name: isbn
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Stock actuel

  /api/books:
    get:
      summary: Liste tous les livres du catalogue
      tags: [Catalogue]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: categorie
          schema: { type: string }
        - in: query
          name: sort
          schema:
            type: string
            enum: [auteur, disponibilite, titre]
      responses:
        '200':
          description: Liste des livres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Livre'

  /api/books/{isbn}/dispo:
    get:
      summary: Récupère le stock réel pour un ISBN précis
      tags: [Catalogue]
      parameters:
        - in: path
          name: isbn
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Stock actuel

  /emprunts:
    get:
      summary: Liste les emprunts
      tags: [Emprunts]
      parameters:
        - in: query
          name: utilisateurId
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Emprunts enregistrés

  /admin/rules:
    get:
      summary: Récupère les règles système
      tags: [Administrateur]
      responses:
        '200':
          description: Liste des règles

  /admin/rules/{ruleId}:
    put:
      summary: Met à jour l’état d’une règle
      tags: [Administrateur]
      parameters:
        - name: ruleId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id_utilisateur: { type: string, format: uuid }
                isbn: { type: string }
      responses:
        '201':
          description: Règle mise à jour

  /admin/users:
    get:
      summary: Récupère les comptes administrables
      tags: [Administrateur]
      responses:
        '200':
          description: Liste des utilisateurs

  /admin/metrics:
    get:
      summary: Statistiques globales du back-office
      tags: [Administrateur]
      responses:
        '200':
          description: Statistiques récupérées

  /users:
    get:
      summary: Liste des utilisateurs
      tags: [Utilisateurs]
      responses:
        '200':
          description: Liste récupérée

  /reservations:
    get:
      summary: Liste des réservations
      tags: [Réservations]
      responses:
        '200':
          description: Réservations réalisées

components:
  schemas:
    Utilisateur:
      type: object
      properties:
        id: { type: string, format: uuid }
        nom: { type: string }
        prenom: { type: string }
        email: { type: string }
        role: { type: string }
        statut: { type: string, example: "ACTIF" }

    Livre:
      type: object
      required: [isbn, titre, auteur, categorie, annee]
      properties:
        isbn: { type: string }
        titre: { type: string }
        auteur: { type: string }
        categorie: { type: string }
        annee: { type: integer }
        est_disponible: { type: boolean }
        exemplaire:
          type: object
          properties:
            id_exemplaire: { type: string, format: uuid }
            disponibilite: { type: boolean }
            etat: { type: string }
            localisation: { type: string }

    Emprunt:
      type: object
      properties:
        id: { type: integer }
        dateEmprunt: { type: string, format: date }
        dateRetourPrevue: { type: string, format: date }
        estRendu: { type: boolean }
        utilisateurId: { type: string, format: uuid }
        exemplaireId: { type: integer }
        dateRetourReelle: { type: string, format: date, nullable: true }

    SystemRule:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        active: { type: boolean }

    AdminUser:
      type: object
      properties:
        id: { type: string }
        fullName: { type: string }
        email: { type: string }
        role: { type: string }
        status: { type: string }

    Reservation:
      type: object
      properties:
        id: { type: string }
        id_utilisateur: { type: string }
        isbn: { type: string }
        statut: { type: string }

    Exemplaire:
      type: object
      properties:
        id_exemplaire: { type: string }
        isbn: { type: string }
        disponibilite: { type: boolean }

    AdminMetrics:
      type: object
      properties:
        totalBooks: { type: integer }
        activeEmprunts: { type: integer }